name: Manter Múltiplos Sites Ativos

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  MAX_RETRIES: 3
  RETRY_DELAY: 5
  TIMEOUT_SECONDS: 30
  ACCEPTED_CODES: "200 302 307 403"

jobs:
  verificar-sites:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [
          "https://stremthru.koyeb.app",
          "https://tmdb--tmdb--v6yfmdzq5nrb.code.run", 
          "https://fenixflix-1m8m.onrender.com",
          "https://betor.vercel.app"
        ]
    steps:
      - name: Verificar ${{ matrix.site }}
        run: |
          echo "🔍 Verificando: ${{ matrix.site }}"
          
          for ((i=1; i<=$MAX_RETRIES; i++)); do
            echo "Tentativa $i de $MAX_RETRIES..."
            
            inicio=$(date +%s%3N)
            http_code=$(curl -s -o /dev/null \
              -w "%{http_code}" \
              --max-time $TIMEOUT_SECONDS \
              -H "User-Agent: GitHub-Actions-Ping/1.0" \
              "${{ matrix.site }}")
            fim=$(date +%s%3N)
            tempo_resposta=$((fim - inicio))
            
            if [[ " $ACCEPTED_CODES " =~ " $http_code " ]]; then
              echo "✅ Sucesso! HTTP: $http_code | Tempo de Resposta: ${tempo_resposta}ms"
              exit 0
            else
              echo "❌ Falhou com HTTP: $http_code | Tempo de Resposta: ${tempo_resposta}ms"
              if [ $i -lt $MAX_RETRIES ]; then
                echo "Aguardando $RETRY_DELAY segundos antes de tentar novamente..."
                sleep $RETRY_DELAY
              fi
            fi
          done
          
          echo "⚠️ Todas as $MAX_RETRIES tentativas falharam para ${{ matrix.site }}"
          exit 1
